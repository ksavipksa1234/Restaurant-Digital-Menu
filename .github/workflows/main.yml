name: Build NassGPS Pro
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Build Pro Sniper
        run: |
          cat <<EOF > nassgps.m
          #import <Foundation/Foundation.h>
          #import <UIKit/UIKit.h>
          #import <CoreLocation/CoreLocation.h>
          #import <objc/runtime.h>

          @interface NassGPSMgr : UIViewController
          @property (strong) UIWindow *win;
          @property (assign) CLLocationCoordinate2D fakePos;
          @end

          @implementation NassGPSMgr
          + (void)load {
              static dispatch_once_t onceToken;
              dispatch_once(&onceToken, ^{
                  dispatch_after(dispatch_time(DISPATCH_TIME_NOW, 5*NSEC_PER_SEC), dispatch_get_main_queue(), ^{
                      NassGPSMgr *m = [[NassGPSMgr alloc] init];
                      m.fakePos = CLLocationCoordinate2DMake(24.7136, 46.6753);
                      
                      m.win = [[UIWindow alloc] initWithFrame:CGRectMake(50, 150, 60, 60)];
                      m.win.backgroundColor = [UIColor colorWithRed:0 green:0.5 blue:1 alpha:0.9];
                      m.win.layer.cornerRadius = 30;
                      m.win.windowLevel = UIWindowLevelAlert + 10.0;
                      m.win.rootViewController = m;
                      
                      UIButton *b = [UIButton buttonWithType:UIButtonTypeCustom];
                      b.frame = m.win.bounds;
                      [b setTitle:@"GPS" forState:UIControlStateNormal];
                      [b addTarget:m action:@selector(openMenu) forControlEvents:UIControlEventTouchUpInside];
                      [m.view addSubview:b];
                      
                      [m.win makeKeyAndVisible];
                      objc_setAssociatedObject([UIApplication sharedApplication], "_nass", m, OBJC_ASSOCIATION_RETAIN_NONATOMIC);
                      
                      UIPanGestureRecognizer *p = [[UIPanGestureRecognizer alloc] initWithTarget:m action:@selector(pan:)];
                      [m.win addGestureRecognizer:p];
                  });
              });
          }

          - (void)openMenu {
              UIAlertController *a = [UIAlertController alertControllerWithTitle:@"NassGPS Pro" message:@"أدخل الإحداثيات الجديدة" preferredStyle:UIAlertControllerStyleAlert];
              [a addTextFieldWithConfigurationHandler:^(UITextField *f){ f.placeholder = @"Latitude"; f.keyboardType = UIKeyboardTypeDecimalPad; }];
              [a addTextFieldWithConfigurationHandler:^(UITextField *f){ f.placeholder = @"Longitude"; f.keyboardType = UIKeyboardTypeDecimalPad; }];
              
              [a addAction:[UIAlertAction actionWithTitle:@"حفظ" style:UIAlertActionStyleDefault handler:^(id x){
                  NSString *latS = a.textFields[0].text;
                  NSString *lngS = a.textFields[1].text;
                  if(latS.length > 0 && lngS.length > 0) {
                      self.fakePos = CLLocationCoordinate2DMake([latS doubleValue], [lngS doubleValue]);
                  }
              }]];
              [a addAction:[UIAlertAction actionWithTitle:@"إلغاء" style:UIAlertActionStyleCancel handler:nil]];
              [self presentViewController:a animated:YES completion:nil];
          }

          - (void)pan:(UIPanGestureRecognizer *)p {
              CGPoint t = [p translationInView:self.win];
              self.win.center = CGPointMake(self.win.center.x + t.x, self.win.center.y + t.y);
              [p setTranslation:CGPointZero inView:self.win];
          }
          @end

          @implementation NSObject (NassHook)
          - (struct CLLocationCoordinate2D)fake_coordinate {
              NassGPSMgr *m = objc_getAssociatedObject([UIApplication sharedApplication], "_nass");
              double j = ((double)arc4random_uniform(100)/1000000.0);
              return (struct CLLocationCoordinate2D){m.fakePos.latitude + j, m.fakePos.longitude + j};
          }
          @end

          __attribute__((constructor)) static void init() {
              method_exchangeImplementations(class_getInstanceMethod(objc_getClass("CLLocation"), @selector(coordinate)),
                                           class_getInstanceMethod(objc_getClass("NSObject"), @selector(fake_coordinate)));
          }
          EOF
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 -isysroot "$SDK_PATH" nassgps.m -o nassgps.dylib -framework Foundation -framework CoreLocation -framework UIKit -lobjc -undefined dynamic_lookup

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: NassGPS-Ultimate
          path: nassgps.dylib
