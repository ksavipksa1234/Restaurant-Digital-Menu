name: Build NassGPS Pro
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract and Build
        run: |
          unzip *.zip
          # البحث عن المجلد الذي يحتوي على ملفات الكود .m
          SOURCE_DIR=$(find . -name "*.m" -exec dirname {} + | head -n 1)
          cd "$SOURCE_DIR"
          
          # أمر البناء الاحترافي
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          clang -dynamiclib -arch arm64 -isysroot "$SDK_PATH" *.m -o nassgps.dylib -framework Foundation -framework CoreLocation -framework UIKit -lobjc -undefined dynamic_lookup

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NassGPS-Final
          path: "**/nassgps.dylib"
